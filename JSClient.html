var chartProduccion=null, chartEstados=null, chartAnalistas=null, chartSLA=null;

// === NAVEGACIÓN ===
function cambiarTab(tabId, el) {
    document.querySelectorAll('.tab-panel').forEach(function(p){p.style.display='none';});
    document.querySelectorAll('.nav-link-admin').forEach(function(a){a.classList.remove('active');});
    var panel=document.getElementById('tab-'+tabId); if(panel) panel.style.display='block';
    if(el) el.classList.add('active');
}

// === INICIALIZACIÓN ===
window.onload = function() {
    document.getElementById('metricasSpinner').style.display = 'none';
    google.script.run.withSuccessHandler(function(email) {
        if(email){var p=email.split('@')[0];document.getElementById('adminEmail').innerText=p.split('.').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(' ');}
    }).getEmailUsuario();
    google.script.run.withSuccessHandler(aplicarPermisos).obtenerPermisoUsuario();
};

function _initFechasYCargar() {
    var h=new Date(), yyyy=h.getFullYear(), mm=String(h.getMonth()+1).padStart(2,'0'), dd=String(h.getDate()).padStart(2,'0');
    document.getElementById('filtroFechaSeguimiento').value=yyyy+'-'+mm+'-'+dd;
    document.getElementById('filtroFechaSeguimiento').max=yyyy+'-'+mm+'-'+dd;
    document.getElementById('filtroFechaRendimiento').value=yyyy+'-'+mm+'-'+dd;
    document.getElementById('filtroFechaRendimiento').max=yyyy+'-'+mm+'-'+dd;
    setRangoRapido('semana');
}

function aplicarPermisos(permiso) {
    if (permiso.rol === 'coordinador') {
        document.getElementById('sidebarNav').style.display = '';
        document.getElementById('barraFiltrosFecha').style.display = '';
        document.getElementById('barraFiltrosGenerales').style.display = '';
        _initFechasYCargar();
    } else if (permiso.rol === 'biometria') {
        document.getElementById('sidebarNav').style.display = '';
        document.querySelectorAll('.nav-link-admin').forEach(function(a) {
            var onclick = a.getAttribute('onclick') || '';
            var esBio = onclick.indexOf("'biometria'") !== -1;
            if (!esBio) a.style.setProperty('display', 'none', 'important');
            else a.classList.add('active');
        });
        document.getElementById('metricasSpinner').style.display = 'none';
        document.getElementById('metricasContenido').style.display = 'block';
        document.getElementById('tab-biometria').style.display = 'block';
        cargarDatosBiometria();
    } else if (permiso.rol === 'sin_acceso') {
        document.getElementById('metricasSpinner').style.display = 'none';
        document.getElementById('metricasContenido').style.display = 'none';
        document.getElementById('barraFiltrosFecha').style.setProperty('display', 'none', 'important');
        document.getElementById('barraFiltrosGenerales').style.setProperty('display', 'none', 'important');
        document.querySelectorAll('.nav-link-admin').forEach(function(a) {
            a.style.setProperty('display', 'none', 'important');
        });
        var main = document.querySelector('.main-content');
        var aviso = document.createElement('div');
        aviso.className = 'text-center py-5';
        aviso.innerHTML = '<div style="margin-top:80px;"><i class="bi bi-shield-lock" style="font-size:4rem;color:var(--text-light);"></i><h3 style="color:var(--text-muted);margin-top:16px;">Sin acceso</h3><p style="color:var(--text-light);font-size:0.85rem;">Tu cuenta <strong>' + esc(permiso.email) + '</strong> no tiene permisos para ver este tablero.<br>Contacta al coordinador del área para solicitar acceso.</p></div>';
        main.appendChild(aviso);
    }
}

// === UTILIDADES ===
function _calcRango(tipo){var h=new Date(),d=new Date();if(tipo==='hoy'){d=new Date(h);}else if(tipo==='semana'){var dow=h.getDay()||7;d.setDate(h.getDate()-(dow-1));}else if(tipo==='mesActual'){d=new Date(h.getFullYear(),h.getMonth(),1);}else if(tipo==='bimestre'){d=new Date(h.getFullYear(),h.getMonth()-1,1);}else if(tipo==='trimestre'){d=new Date(h.getFullYear(),h.getMonth()-2,1);}return{desde:d,hasta:h};}
function setRangoRapido(tipo){var r=_calcRango(tipo);document.getElementById('metricaDesde').value=fmtDI(r.desde);document.getElementById('metricaHasta').value=fmtDI(r.hasta);cargarMetricas();}
function fmtDI(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDB(v){if(!v)return '';var p=v.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function aplicarFiltroFechas(){if(!document.getElementById('metricaDesde').value||!document.getElementById('metricaHasta').value){Swal.fire({icon:'warning',title:'Fechas incompletas'});return;}cargarMetricas();}
function _fmtDurStr(ts,vacio){var h=Math.floor(ts/3600),mn=Math.round((ts%3600)/60);if(mn===60){h++;mn=0;}var p=[];if(h>0)p.push(h+' '+(h===1?'hora':'horas'));if(mn>0)p.push(mn+' min');return p.length?p.join(' '):vacio;}
function formatearDuracion(m){if(!m||m===0)return'—';return _fmtDurStr(Math.round(m*60),'—');}
function formatearTiempoGeneral(hr){if(!hr||hr===0)return'—';return _fmtDurStr(Math.round(hr*3600),'—');}
function fmtMin(m){if(!m||m===0)return'';return _fmtDurStr(Math.round(m*60),'');}
function fmtHrs(hr){if(!hr||hr===0)return'';return _fmtDurStr(Math.round(hr*3600),'');}
function wrapLabel(str,maxLen){if(!str)return str;var words=str.split(' '),lines=[],cur='';words.forEach(function(w){if(!cur){cur=w;}else if((cur+' '+w).length<=maxLen){cur+=' '+w;}else{lines.push(cur);cur=w;}});if(cur)lines.push(cur);return lines.length>1?lines:str;}
function _fmtDurHTML(ts,vacio){var h=Math.floor(ts/3600),mn=Math.round((ts%3600)/60);if(mn===60){h++;mn=0;}if(h>0&&mn>0)return h+' '+(h===1?'hora':'horas')+'<br>'+mn+' min';if(h>0)return h+' '+(h===1?'hora':'horas');return mn>0?mn+' min':vacio;}
function formatearDuracionKPI(m){if(!m||m===0)return'—';return _fmtDurHTML(Math.round(m*60),'—');}
function formatearTiempoGeneralKPI(hr){if(!hr||hr===0)return'—';return _fmtDurHTML(Math.round(hr*3600),'—');}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// === CARGA ===
function cargarMetricas(){
    document.getElementById('metricasSpinner').style.display='block';
    document.getElementById('metricasContenido').style.display='none';
    google.script.run.withSuccessHandler(onDatosCargados).withFailureHandler(function(e){document.getElementById('metricasSpinner').style.display='none';Swal.fire({icon:'error',title:'Error',text:e.message});}).obtenerDatosMetricas(fmtDB(document.getElementById('metricaDesde').value),fmtDB(document.getElementById('metricaHasta').value));
}

function onDatosCargados(datos){
    _datosCompletos = datos;
    _segmentacionData = datos.segmentacion || {};
    poblarFiltroSegmento();
    poblarFiltrosGenerales(datos.tiemposDetalle);
    mostrarAvisoReestudios(datos.reestudiosDisponibles);
    aplicarFiltroSegmentoGlobal();
    cargarRendimientoPorDia();
    cargarAsesoresActivosPrimerResultado();
    cargarColaAsignacion();
}
function mostrarAvisoReestudios(disponible){
    var prev=document.getElementById('avisoReestudios');
    if(prev) prev.remove();
    if(disponible===false){
        var w=document.createElement('div');
        w.id='avisoReestudios';
        w.className='alert alert-warning d-flex align-items-center';
        w.style.cssText='margin:10px 20px;font-size:0.85rem;border-radius:12px;';
        w.innerHTML='<i class="bi bi-exclamation-triangle-fill me-2"></i> Los datos de reestudios/UAR no están disponibles en este momento. Las métricas mostradas pueden estar incompletas.';
        var c=document.getElementById('metricasContenido');
        if(c) c.insertBefore(w,c.firstChild);
    }
}

// === FILTROS GENERALES ===
function poblarFiltrosGenerales(td){
    var sucursales={}, analistas={};
    td.forEach(function(r){
        if(r.sucursal) sucursales[r.sucursal]=true;
        if(r.analista) analistas[r.analista]=true;
    });
    var selSuc=document.getElementById('filtroSucursalGlobal');
    selSuc.innerHTML='<option value="todas">Todas</option>';
    Object.keys(sucursales).sort().forEach(function(s){selSuc.innerHTML+='<option value="'+esc(s)+'">'+esc(s)+'</option>';});
    var selAna=document.getElementById('filtroAnalistaGlobal');
    selAna.innerHTML='<option value="todos">Todos</option>';
    Object.keys(analistas).sort().forEach(function(a){selAna.innerHTML+='<option value="'+esc(a)+'">'+esc(a)+'</option>';});
}

function obtenerFiltrosGenerales(){
    return {
        solicitud: (document.getElementById('filtroSolicitud').value||'').trim().toLowerCase(),
        poliza: (document.getElementById('filtroPoliza').value||'').trim().toLowerCase(),
        sucursal: document.getElementById('filtroSucursalGlobal').value,
        tipo: document.getElementById('filtroTipoGlobal').value,
        estado: document.getElementById('filtroEstadoGlobal').value,
        analista: document.getElementById('filtroAnalistaGlobal').value
    };
}

function aplicarFiltrosGeneralesADatos(tiempos){
    var f=obtenerFiltrosGenerales();
    return tiempos.filter(function(r){
        if(f.solicitud && !(r.solicitud||'').toLowerCase().includes(f.solicitud)) return false;
        if(f.poliza && !(r.poliza||'').toLowerCase().includes(f.poliza)) return false;
        if(f.sucursal!=='todas' && r.sucursal && r.sucursal!==f.sucursal) return false;
        if(f.tipo!=='todos' && r.tipo && r.tipo!==f.tipo) return false;
        if(f.estado!=='todos' && r.estado && r.estado!==f.estado) return false;
        if(f.analista!=='todos' && r.analista && r.analista!==f.analista) return false;
        return true;
    });
}

function aplicarFiltrosGenerales(){ aplicarFiltroSegmentoGlobal(); }

function limpiarFiltrosGenerales(){
    document.getElementById('filtroSolicitud').value='';
    document.getElementById('filtroPoliza').value='';
    document.getElementById('filtroSucursalGlobal').value='todas';
    document.getElementById('filtroTipoGlobal').value='todos';
    document.getElementById('filtroEstadoGlobal').value='todos';
    document.getElementById('filtroAnalistaGlobal').value='todos';
    aplicarFiltroSegmentoGlobal();
}

function debounceFiltroPoliza(){
    if(_debouncePolizaTimer) clearTimeout(_debouncePolizaTimer);
    _debouncePolizaTimer=setTimeout(function(){ aplicarFiltrosGenerales(); },400);
}

function debounceFiltroSolicitud(){
    if(_debounceSolicitudTimer) clearTimeout(_debounceSolicitudTimer);
    _debounceSolicitudTimer=setTimeout(function(){ aplicarFiltrosGenerales(); },400);
}

// === DRILL-DOWN KPI ===
function drilldownKPI(tipo){
    var datos=_ultimosTiemposFiltrados||[];
    var titulo='', lista=[], tiempoLabel='Tiempo', tiempoFn=function(){return'—';};

    if(tipo==='total'){
        titulo='Total Gestionadas ('+datos.length+')';
        lista=datos;
        tiempoLabel='T. Gestión';
        tiempoFn=function(r){return r.tGestion!=null?formatearDuracion(r.tGestion):'—';};
    } else if(tipo==='tiempoGestion'){
        lista=datos.filter(function(r){return r.tGestion!=null;}).sort(function(a,b){return b.tGestion-a.tGestion;});
        titulo='Tiempo Gestión — Top 100 más lentas';
        tiempoLabel='T. Gestión';
        tiempoFn=function(r){return formatearDuracion(r.tGestion);};
    } else if(tipo==='tiempoGeneral'){
        lista=datos.filter(function(r){return r.tResolucion!=null;}).sort(function(a,b){return b.tResolucion-a.tResolucion;});
        titulo='Tiempo General — Top 100 más lentas';
        tiempoLabel='T. General';
        tiempoFn=function(r){return formatearTiempoGeneral(r.tResolucion);};
    } else if(tipo==='tiempoCola'){
        lista=datos.filter(function(r){return r.tCola!=null&&r.tCola!==undefined;}).sort(function(a,b){return b.tCola-a.tCola;});
        titulo='Tiempo de Cola — Top 100 mayor espera ('+lista.length+' con dato)';
        tiempoLabel='T. Cola';
        tiempoFn=function(r){return formatearDuracion(r.tCola);};
    } else if(tipo==='aprobacion'){
        lista=datos.filter(function(r){return r.estado==='APROBADA';});
        titulo='Solicitudes Aprobadas ('+lista.length+')';
        tiempoLabel='T. Gestión';
        tiempoFn=function(r){return r.tGestion!=null?formatearDuracion(r.tGestion):'—';};
    } else if(tipo==='negacionDirecta'){
        var nd=_datosCompletos?(_datosCompletos.negacionDirecta||0):0;
        var pct=_datosCompletos?(_datosCompletos.pctNegacionDirecta||0):0;
        var tr=_datosCompletos?(_datosCompletos.totalRadicadas||0):0;
        Swal.fire({title:'Negación Directa',html:'<div style="text-align:center;"><div style="font-size:3rem;font-weight:800;color:#BD0F14;">'+nd+'</div><div style="font-size:0.85rem;color:#706F6F;margin-top:4px;">solicitudes rechazadas directamente por SAI</div><div style="font-size:1.2rem;font-weight:700;margin-top:12px;">'+pct+'% de '+tr+' radicadas</div><div style="font-size:0.75rem;color:#706F6F;margin-top:8px;">Total radicadas = Histórico Gestiones + Reestudios + Negación Directa</div></div>',width:450,confirmButtonColor:'#BD0F14',confirmButtonText:'Cerrar'});
        return;
    } else if(tipo==='backlog'){
        lista=window._backlogDetalle||[];
        titulo='Backlog Activo ('+lista.length+')';
        tiempoLabel='T. Espera';
        tiempoFn=function(r){return formatearDuracion(r.minutosEspera);};
    } else if(tipo==='tipoGeneral'){
        lista=datos;
        titulo='Todas las Solicitudes ('+datos.length+')';
        tiempoLabel='T. Gestión';
        tiempoFn=function(r){return r.tGestion!=null?formatearDuracion(r.tGestion):'—';};
    } else if(tipo.startsWith('tipo')){
        var mapTipo={'tipoDigital':'Digital','tipoUAR':'UAR','tipoReestudio':'Reestudio','tipoBiometria':'Biometría','tipoInduccion':'Inducción'};
        var tipoFiltro=mapTipo[tipo]||'';
        lista=datos.filter(function(r){return r.tipo===tipoFiltro;});
        titulo=tipoFiltro+' ('+lista.length+')';
        tiempoLabel='T. Gestión';
        tiempoFn=function(r){return r.tGestion!=null?formatearDuracion(r.tGestion):'—';};
    }

    var header='<tr><th>Fecha</th><th>Solicitud</th><th>Analista</th><th>Estado</th><th>'+tiempoLabel+'</th></tr>';
    var filas=lista.slice(0,100).map(function(r){
        return '<tr><td>'+esc(r.fecha||'—')+'</td><td class="fw-bold">'+esc(r.solicitud||'—')+'</td><td>'+esc(r.analista||'—')+'</td><td>'+esc(r.estado||'—')+'</td><td>'+tiempoFn(r)+'</td></tr>';
    });
    Swal.fire({title:titulo,html:'<div style="max-height:400px;overflow:auto;"><table class="table table-sm" style="font-size:0.8rem;"><thead>'+header+'</thead><tbody>'+filas.join('')+'</tbody></table></div>'+(lista.length>100?'<p style="font-size:0.7rem;color:#706F6F;margin-top:8px;">Mostrando primeras 100 de '+lista.length+'</p>':''),width:750,confirmButtonColor:'#BD0F14',confirmButtonText:'Cerrar'});
}

    bioTasaConversion:{t:'Tasa de Conversión',d:'Porcentaje de solicitudes que se resolvieron sin asignar (biometría completada tras el WhatsApp) sobre el total consultado. Esta es la métrica clave para evaluar si el broadcast de WhatsApp es efectivo. Una tasa alta significa que el mensaje está funcionando y reduce la carga operativa del equipo.'},
    bioEfectividad:{t:'Resultado del Broadcast',d:'Muestra qué pasó después de enviar el WhatsApp a los clientes con biometría pendiente:<br><br><b>Completó biometría:</b> el cliente realizó la biometría tras el mensaje, sin necesidad de llamada del analista.<br><b>Enviada a cola:</b> el cliente no completó la biometría y la solicitud tuvo que asignarse a un analista para contacto telefónico.<br><br>Cuanto mayor sea la barra verde, más efectivo es el broadcast para reducir la carga operativa.'},
    bioTendencia:{t:'Tendencia Diaria',d:'Evolución día a día de tres métricas: solicitudes consultadas del API, resueltas sin asignar y enviadas a cola. Permite identificar patrones, días con mayor volumen y la evolución de la efectividad del broadcast.'},
    bioFunnel:{t:'Funnel de Conversión',d:'Embudo que muestra la reducción desde las solicitudes consultadas → mensajes enviados → biometrías completadas. Cada barra es un paso del proceso. Cuanto más se conserve el volumen entre pasos, mejor funciona el ciclo automatizado.'},
    bioDistribucion:{t:'Distribución de Resultados',d:'Proporción final de las solicitudes procesadas por el ciclo de biometría: completadas (el cliente hizo la biometría), enviadas a cola (necesitan llamada del analista), y sin resultado aún (esperando el siguiente ciclo de verificación).'},
    bioTasaTendencia:{t:'Tasa de Conversión en el Tiempo',d:'Porcentaje diario de solicitudes que completaron biometría tras el broadcast. Los puntos verdes indican días con buena conversión (≥50%), los naranjas días bajos. Permite detectar si la estrategia de mensajería está mejorando o deteriorándose.'},
    bioResLlamada:{t:'Resultado de Llamada',d:'Distribución del resultado de las llamadas realizadas por los analistas a solicitudes de biometría: OK Llamada (se logró contacto) vs No Contestó. Una tasa baja de contacto puede indicar horarios inadecuados de llamada o datos de contacto incorrectos.'},
    bioResFinal:{t:'Resultado Final',d:'Distribución del resultado final de las solicitudes de biometría gestionadas por analistas: Aprobada, Negada o Aplazada. Permite evaluar la calidad de los casos que llegan a gestión manual.'},
    bioMotivos:{t:'Motivos de Aplazamiento',d:'Desglose de las razones por las que se aplazaron solicitudes de biometría. Cada motivo indica un obstáculo diferente: agotó intentos, error en la página, cliente no desea realizarlo, etc. Útil para identificar problemas sistémicos.'},
    bioGestion:{t:'Resultados de Gestión',d:'Resumen de las solicitudes de biometría que fueron asignadas a analistas y gestionadas. Incluye resultado de la llamada (¿se logró contacto?) y resultado final de la solicitud (aprobada/negada/aplazada). Estos son los casos que el broadcast no logró resolver automáticamente.'}
};

function poblarFiltroSegmento(){
    var sel=document.getElementById('filtroSegmento');
    var current = sel.value;
    sel.innerHTML='<option value="todos">Todos los Segmentos</option>';
    Object.keys(_segmentacionData).sort().forEach(function(s){sel.innerHTML+='<option value="'+esc(s)+'">'+esc(s)+' ('+_segmentacionData[s].length+')</option>';});

function filtrarSegmentacion(){ aplicarFiltroSegmentoGlobal(); }

function aplicarFiltroSegmentoGlobal(){
    if(!_datosCompletos) return;
    var seg = document.getElementById('filtroSegmento').value;
    var datos = _datosCompletos;

    // Si es "todos", usar datos pre-calculados del backend
    if(seg === 'todos'){
        var tiemposBase = aplicarFiltrosGeneralesADatos(datos.tiemposDetalle);
        var backlogBase = aplicarFiltrosGeneralesADatos(datos.backlogDetalle || []);
        // Si no hay filtros generales activos, usar datos originales optimizados
        var fg = obtenerFiltrosGenerales();
        var hayFiltros = fg.solicitud || fg.poliza || fg.sucursal!=='todas' || fg.tipo!=='todos' || fg.estado!=='todos' || fg.analista!=='todos';
        if(!hayFiltros){
            renderizarConDatos(datos, datos.tiemposDetalle, datos.backlogDetalle || []);
        } else {
            recalcularYRenderizar(tiemposBase, backlogBase, datos);
        }
        return;
    }

    // Filtrar por segmento
    var tiemposFiltrados = datos.tiemposDetalle.filter(function(r){ return r.segmento === seg; });
    tiemposFiltrados = aplicarFiltrosGeneralesADatos(tiemposFiltrados);
    var backlogFiltrado = (datos.backlogDetalle||[]).filter(function(r){ return r.segmento === seg; });
    backlogFiltrado = aplicarFiltrosGeneralesADatos(backlogFiltrado);

    recalcularYRenderizar(tiemposFiltrados, backlogFiltrado, datos);
}

function recalcularYRenderizar(tiemposFiltrados, backlogFiltrado, datos){
    var seg = document.getElementById('filtroSegmento').value;
    // Recalcular todo desde tiemposFiltrados
    var totalGest=tiemposFiltrados.length, sumaG=0, cG=0, sumaR=0, cR=0, fueraSLA=0;
    var aprobadas=0, negadas=0, aplazadas=0;
    var produccionMap={}, slaMap={}, sucursalMap={}, tipoMap={}, analistaMap={};
    var negacionSucMap={}, heatmap={};
    var sumaCola=0, cCola=0;

    tiemposFiltrados.forEach(function(r){
        // Estados
        if(r.estado==='APROBADA') aprobadas++;
        else if(r.estado==='NEGADA') negadas++;
        else if(r.estado==='APLAZADA') aplazadas++;

        if(r.tGestion !== null){ sumaG += r.tGestion; cG++; }
        if(r.tResolucion !== null){ sumaR += r.tResolucion; cR++; if(r.tResolucion > 2) fueraSLA++; }
        if(r.tCola !== null && r.tCola !== undefined){ sumaCola += r.tCola; cCola++; }

        // Producción diaria
        if(!produccionMap[r.fecha]) produccionMap[r.fecha] = 0;
        produccionMap[r.fecha]++;

        // SLA diario
        if(!slaMap[r.fecha]) slaMap[r.fecha] = {dentroSLA:0, fueraSLA:0};
        if(r.tResolucion !== null){ if(r.tResolucion <= 2) slaMap[r.fecha].dentroSLA++; else slaMap[r.fecha].fueraSLA++; }

        // Sucursal diario
        if(!sucursalMap[r.fecha]) sucursalMap[r.fecha] = {};
        sucursalMap[r.fecha][r.sucursal] = (sucursalMap[r.fecha][r.sucursal]||0) + 1;

        // Tipo diario
        if(!tipoMap[r.fecha]) tipoMap[r.fecha] = {Digital:0,UAR:0,Reestudio:0,'Biometría':0,'Inducción':0};
        if(tipoMap[r.fecha][r.tipo] !== undefined) tipoMap[r.fecha][r.tipo]++;

        // Analista
        if(!analistaMap[r.analista]) analistaMap[r.analista] = {total:0, tG:0, cG:0, fSLA:0};
        analistaMap[r.analista].total++;
        if(r.tGestion !== null){ analistaMap[r.analista].tG += r.tGestion; analistaMap[r.analista].cG++; }
        if(r.tResolucion !== null && r.tResolucion > 2) analistaMap[r.analista].fSLA++;

        // Negación por sucursal
        if(!negacionSucMap[r.sucursal]) negacionSucMap[r.sucursal] = {total:0, negadas:0};
        negacionSucMap[r.sucursal].total++;
        if(r.estado==='NEGADA') negacionSucMap[r.sucursal].negadas++;
    });

    // Tiempo de cola promedio (calculado desde tCola de cada registro)
    var tiempoColaProm = cCola > 0 ? Math.round(sumaCola / cCola * 10) / 10 : 0;
    var tasaAprob = totalGest > 0 ? Math.round(aprobadas / totalGest * 1000) / 10 : 0;

    // Construir objetos derivados
    var fechasOrden = Object.keys(produccionMap).sort(function(a,b){var pa=a.split('/'),pb=b.split('/');return new Date(pa[2],pa[1]-1,pa[0])-new Date(pb[2],pb[1]-1,pb[0]);});
    var produccionDiaria = fechasOrden.map(function(f){return{fecha:f,cantidad:produccionMap[f]};});
    var slaDiario = Object.keys(slaMap).sort(function(a,b){var pa=a.split('/'),pb=b.split('/');return new Date(pa[2],pa[1]-1,pa[0])-new Date(pb[2],pb[1]-1,pb[0]);}).map(function(f){return{fecha:f,dentroSLA:slaMap[f].dentroSLA,fueraSLA:slaMap[f].fueraSLA};});

    // porSucursal
    var sucursalesUnicas={};
    Object.keys(sucursalMap).forEach(function(f){Object.keys(sucursalMap[f]).forEach(function(s){sucursalesUnicas[s]=true;});});
    var listaSuc=Object.keys(sucursalesUnicas).sort();
    var porSucursal={fechas:fechasOrden,sucursales:listaSuc,datos:{}};
    listaSuc.forEach(function(s){porSucursal.datos[s]=fechasOrden.map(function(f){return (sucursalMap[f]&&sucursalMap[f][s])||0;});});

    // porTipo
    var porTipo = fechasOrden.map(function(f){var t=tipoMap[f]||{Digital:0,UAR:0,Reestudio:0,'Biometría':0,'Inducción':0};return{fecha:f,Digital:t.Digital||0,UAR:t.UAR||0,Reestudio:t.Reestudio||0,Biometria:t['Biometría']||0,Induccion:t['Inducción']||0};});

    // porAnalista
    var porAnalista = Object.keys(analistaMap).map(function(n){var a=analistaMap[n];return{nombre:n,total:a.total,aprobadas:0,negadas:0,aplazadas:0,tiempoPromedio:a.cG>0?Math.round(a.tG/a.cG*10)/10:0,tiempoPromedioGeneral:0,promedioPorHora:0,prodRealPorHora:0,detalleHoras:{},fueraSLA:a.fSLA||0};}).sort(function(a,b){return b.total-a.total;});

    // Tasa negación por sucursal
    var tasaNegSuc = Object.keys(negacionSucMap).map(function(s){var d=negacionSucMap[s];return{sucursal:s,total:d.total,negadas:d.negadas,tasa:d.total>0?Math.round(d.negadas/d.total*1000)/10:0};}).sort(function(a,b){return b.tasa-a.tasa;});

    // Tendencia SLA diaria
    var fechasSLA=Object.keys(slaMap).sort(function(a,b){var pa=a.split('/'),pb=b.split('/');return new Date(pa[2],pa[1]-1,pa[0])-new Date(pb[2],pb[1]-1,pb[0]);});
    var tendenciaSLA=fechasSLA.map(function(f){var d=slaMap[f];var t=d.dentroSLA+d.fueraSLA;return{fecha:f,pctCumplimiento:t>0?Math.round(d.dentroSLA/t*1000)/10:100};});

    var datosFiltrados = {
        totalGestionadas: totalGest,
        tiempoPromedioMinutos: cG > 0 ? Math.round(sumaG/cG*10)/10 : 0,
        tiempoColaPromedio: tiempoColaProm,
        tiempoPromedioGeneralHoras: cR > 0 ? Number((sumaR/cR).toFixed(2)) : 0,
        tasaAprobacion: tasaAprob,
        fueraDeSLA: fueraSLA,
        backlog: backlogFiltrado.length,
        backlogDetalle: backlogFiltrado,
        segmentacion: _segmentacionData,
        produccionDiaria: produccionDiaria,
        distribucionEstados: {aprobadas:aprobadas,negadas:negadas,aplazadas:aplazadas},
        porAnalista: porAnalista,
        slaDiario: slaDiario,
        porSucursal: porSucursal,
        porTipo: porTipo,
        tiemposDetalle: tiemposFiltrados,
        tasaNegacionSucursal: tasaNegSuc,
        tendenciaSLA: tendenciaSLA,
        heatmapHora: datos.heatmapHora,
        negacionDirecta: datos.negacionDirecta,
        pctNegacionDirecta: datos.pctNegacionDirecta
    };

    renderizarConDatos(datosFiltrados, tiemposFiltrados, backlogFiltrado);
}

function renderizarConDatos(datos, tiemposFiltrados, backlogFiltrado){
    _ultimosTiemposFiltrados=tiemposFiltrados;
    document.getElementById('metricasSpinner').style.display='none';
    document.getElementById('metricasContenido').style.display='block';

    var ahora=new Date();
    document.getElementById('ultimaSincronizacion').textContent='Última sync: '+String(ahora.getDate()).padStart(2,'0')+'/'+String(ahora.getMonth()+1).padStart(2,'0')+'/'+ahora.getFullYear()+' '+String(ahora.getHours()).padStart(2,'0')+':'+String(ahora.getMinutes()).padStart(2,'0');
    document.getElementById('btnDescargarExcel').style.display='flex';

    // KPIs
    document.getElementById('kpiTotal').textContent=datos.totalGestionadas;
    document.getElementById('kpiTiempo').innerHTML=formatearDuracionKPI(datos.tiempoPromedioMinutos);
    document.getElementById('kpiTiempoCola').innerHTML=formatearDuracionKPI(datos.tiempoColaPromedio);
    document.getElementById('kpiTiempoGeneral').innerHTML=formatearTiempoGeneralKPI(datos.tiempoPromedioGeneralHoras||0);
    document.getElementById('kpiRadicadas').textContent=datos.totalRadicadas||0;
    document.getElementById('kpiAprobacion').innerHTML=datos.tasaAprobacion+'%';
    document.getElementById('kpiNegacion').innerHTML=(datos.pctNegacion||0)+'<span style="font-size:1rem;font-weight:600;">%</span>';
    document.getElementById('kpiAplazamiento').innerHTML=(datos.pctAplazamiento||0)+'<span style="font-size:1rem;font-weight:600;">%</span>';
    document.getElementById('kpiNegacionDirecta').innerHTML=(datos.pctNegacionDirecta||0)+'<span style="font-size:1rem;font-weight:600;">%</span>';
    document.getElementById('kpiNegacionDirectaCount').textContent=(datos.negacionDirecta||0);

    // Tipo cards
    var tT={Digital:0,UAR:0,Reestudio:0,Biometria:0,Induccion:0}, nD=datos.porTipo.length||1;
    datos.porTipo.forEach(function(d){tT.Digital+=d.Digital;tT.UAR+=d.UAR;tT.Reestudio+=d.Reestudio;tT.Biometria+=d.Biometria;tT.Induccion+=d.Induccion;});
    var tG=tT.Digital+tT.UAR+tT.Reestudio+tT.Biometria+tT.Induccion;
    document.getElementById('kpiTipoGeneral').textContent=tG;
    document.getElementById('kpiTipoGeneralProm').textContent=Math.round(tG/nD);
    document.getElementById('kpiTipoDigital').textContent=tT.Digital;
    document.getElementById('kpiTipoDigitalProm').textContent=Math.round(tT.Digital/nD);
    document.getElementById('kpiTipoUAR').textContent=tT.UAR;
    document.getElementById('kpiTipoUARProm').textContent=Math.round(tT.UAR/nD);
    document.getElementById('kpiTipoReestudio').textContent=tT.Reestudio;
    document.getElementById('kpiTipoReestudioProm').textContent=Math.round(tT.Reestudio/nD);
    document.getElementById('kpiTipoBiometria').textContent=tT.Biometria;
    document.getElementById('kpiTipoBiometriaProm').textContent=Math.round(tT.Biometria/nD);
    document.getElementById('kpiTipoInduccion').textContent=tT.Induccion;
    document.getElementById('kpiTipoInduccionProm').textContent=Math.round(tT.Induccion/nD);

    // Gráficos
    renderChartProduccion(datos.produccionDiaria);
    renderChartEstados(datos.distribucionEstados);
    renderChartAnalistas(datos.porAnalista);
    renderChartSLA(datos.slaDiario);
    renderChartSucursal(datos.porSucursal);
    renderChartTipo(datos.porTipo);
    renderChartMensual(datos.porTipo);
    renderChartMensualSucursal(datos.porSucursal);
    renderTendenciaSLA(datos.tendenciaSLA);
    document.getElementById('kpiBacklog').textContent=datos.backlog;
    window._backlogDetalle=backlogFiltrado;
    renderHeatmapHora(datos.heatmapHora);
    renderTiemposPorTipo(tiemposFiltrados);
    inicializarFiltrosTiempos(tiemposFiltrados);
    renderChartDispersion(datos.porAnalista);
    renderBacklogSemaforo(backlogFiltrado);
    renderVolumenSucursal(tiemposFiltrados);
    renderTiemposSucursal(tiemposFiltrados);
    _porAnalistaCompleto=datos.porAnalista;

    // Segmentación gráficos específicos
    var seg=document.getElementById('filtroSegmento').value;
    var cont=document.getElementById('segmentacionContenido');
    cont.innerHTML='';

    // Determinar si hay filtros generales activos
    var fg2=obtenerFiltrosGenerales();
    var hayFiltrosActivos=fg2.solicitud||fg2.poliza||fg2.sucursal!=='todas'||fg2.tipo!=='todos'||fg2.estado!=='todos'||fg2.analista!=='todos';

    if(hayFiltrosActivos){
        // Recalcular segmentación desde tiemposFiltrados
        var segInmob={};
        tiemposFiltrados.forEach(function(r){
            var inmob=r.inmobiliaria||'Sin Nombre';
            if(!segInmob[inmob])segInmob[inmob]={inmobiliaria:inmob,count:0,sumaG:0,cG:0,sumaR:0,cR:0};
            segInmob[inmob].count++;
            if(r.tGestion!==null){segInmob[inmob].sumaG+=r.tGestion;segInmob[inmob].cG++;}
            if(r.tResolucion!==null){segInmob[inmob].sumaR+=r.tResolucion;segInmob[inmob].cR++;}
        });
        var listaSegFiltrada=Object.keys(segInmob).map(function(k){var c=segInmob[k];return{inmobiliaria:c.inmobiliaria,count:c.count,tiempoColaPromedio:0,tiempoGestionPromedio:c.cG>0?Math.round(c.sumaG/c.cG*10)/10:0,tiempoGeneralPromedio:c.cR>0?Number((c.sumaR/c.cR).toFixed(2)):0};}).sort(function(a,b){return b.count-a.count;});
        if(listaSegFiltrada.length>0){
            renderVolumenInmob(listaSegFiltrada);
            renderComparativaTiempos(listaSegFiltrada);
        } else {
            if(chartVolumenInmob){chartVolumenInmob.destroy();chartVolumenInmob=null;}
            if(chartComparativaTiempos){chartComparativaTiempos.destroy();chartComparativaTiempos=null;}
        }
    } else if(seg!=='todos'&&_segmentacionData[seg]){
        renderVolumenInmob(_segmentacionData[seg]);
        renderComparativaTiempos(_segmentacionData[seg]);
    } else {
        // Consolidar todas las inmobiliarias de todos los segmentos
        var consolidado={};
        Object.keys(_segmentacionData).forEach(function(s){
            _segmentacionData[s].forEach(function(inmob){
                if(!consolidado[inmob.inmobiliaria]) consolidado[inmob.inmobiliaria]={inmobiliaria:inmob.inmobiliaria,count:0,sumaCola:0,cCola:0,sumaGestion:0,cGestion:0,sumaGeneral:0,cGeneral:0};
                consolidado[inmob.inmobiliaria].count+=inmob.count;
                if(inmob.tiempoColaPromedio>0){consolidado[inmob.inmobiliaria].sumaCola+=inmob.tiempoColaPromedio*inmob.count;consolidado[inmob.inmobiliaria].cCola+=inmob.count;}
                if(inmob.tiempoGestionPromedio>0){consolidado[inmob.inmobiliaria].sumaGestion+=inmob.tiempoGestionPromedio*inmob.count;consolidado[inmob.inmobiliaria].cGestion+=inmob.count;}
                if(inmob.tiempoGeneralPromedio>0){consolidado[inmob.inmobiliaria].sumaGeneral+=inmob.tiempoGeneralPromedio*inmob.count;consolidado[inmob.inmobiliaria].cGeneral+=inmob.count;}
            });
        });
        var listaConsolidada=Object.keys(consolidado).map(function(k){var c=consolidado[k];return{inmobiliaria:c.inmobiliaria,count:c.count,tiempoColaPromedio:c.cCola>0?Math.round(c.sumaCola/c.cCola*10)/10:0,tiempoGestionPromedio:c.cGestion>0?Math.round(c.sumaGestion/c.cGestion*10)/10:0,tiempoGeneralPromedio:c.cGeneral>0?Number((c.sumaGeneral/c.cGeneral).toFixed(2)):0};}).sort(function(a,b){return b.count-a.count;});
        if(listaConsolidada.length>0){
            renderVolumenInmob(listaConsolidada);
            renderComparativaTiempos(listaConsolidada);
        } else {
            if(chartVolumenInmob){chartVolumenInmob.destroy();chartVolumenInmob=null;}
            if(chartComparativaTiempos){chartComparativaTiempos.destroy();chartComparativaTiempos=null;}
        }
    }

}

function descargarExcelConsolidado() {
    if (!_datosCompletos || !_ultimosTiemposFiltrados || _ultimosTiemposFiltrados.length === 0) {
        Swal.fire({ icon: 'warning', title: 'Sin datos', text: 'Primero carga los datos seleccionando un rango de fechas.' });
        return;
    }

    try {
        var wb = XLSX.utils.book_new();
        var td = _ultimosTiemposFiltrados;
        var datos = _datosCompletos;

        // === HOJA 1: Detalle de Solicitudes ===
        var detRows = [['Solicitud', 'Póliza', 'Fecha Gestión', 'Analista', 'Estado', 'Sucursal', 'Tipo', 'Segmento', 'Inmobiliaria', 'T. Cola (min)', 'T. Gestión (min)', 'T. General (horas)', 'Dentro SLA']];
        td.forEach(function(r) {
            detRows.push([
                r.solicitud || '',
                r.poliza || '',
                r.fecha || '',
                r.analista || '',
                r.estado || '',
                r.sucursal || '',
                r.tipo || '',
                r.segmento || '',
                r.inmobiliaria || '',
                r.tCola !== null && r.tCola !== undefined ? r.tCola : '',
                r.tGestion !== null ? r.tGestion : '',
                r.tResolucion !== null ? r.tResolucion : '',
                r.tResolucion !== null ? (r.tResolucion <= 2 ? 'Sí' : 'No') : ''
            ]);
        });
        var wsDetalle = XLSX.utils.aoa_to_sheet(detRows);
        _ajustarAnchosColumnas(wsDetalle, detRows);
        XLSX.utils.book_append_sheet(wb, wsDetalle, 'Detalle Solicitudes');

        // === HOJA 2: Resumen por Analista ===
        var pa = datos.porAnalista || [];
        var anRows = [['Analista', 'Total', 'Aprobadas', 'Negadas', 'Aplazadas', 'T. Gestión Prom (min)', 'T. General Prom (horas)', 'Ritmo/h', 'Prod/h', 'Fuera SLA', '% Aprobación', '% Negación']];
        pa.forEach(function(a) {
            var pctAprob = a.total > 0 ? Math.round(a.aprobadas / a.total * 1000) / 10 : 0;
            var pctNeg = a.total > 0 ? Math.round(a.negadas / a.total * 1000) / 10 : 0;
            anRows.push([
                a.nombre, a.total, a.aprobadas, a.negadas, a.aplazadas,
                a.tiempoPromedio, a.tiempoPromedioGeneral,
                a.promedioPorHora || '', a.prodRealPorHora || '',
                a.fueraSLA, pctAprob, pctNeg

        var wsAnalista = XLSX.utils.aoa_to_sheet(anRows);

        // === HOJA 3: Resumen por Sucursal ===
        var sucMap = {};
        td.forEach(function(r) {
            if (!sucMap[r.sucursal]) sucMap[r.sucursal] = { total: 0, aprob: 0, neg: 0, aplaz: 0, sumaG: 0, cG: 0, sumaR: 0, cR: 0, sumaCola: 0, cCola: 0, fueraSLA: 0 };
            var s = sucMap[r.sucursal];

            if (r.estado === 'NEGADA') s.neg++;
            if (r.estado === 'APLAZADA') s.aplaz++;
            if (r.tGestion !== null) { s.sumaG += r.tGestion; s.cG++; }
            if (r.tResolucion !== null && r.tResolucion > 0) { s.sumaR += r.tResolucion; s.cR++; if (r.tResolucion > 2) s.fueraSLA++; }
            if (r.tCola !== null) { s.sumaCola += r.tCola; s.cCola++; }
        });
        var sucRows = [['Sucursal', 'Total', 'Aprobadas', 'Negadas', 'Aplazadas', 'T. Cola Prom (min)', 'T. Gestión Prom (min)', 'T. General Prom (horas)', 'Fuera SLA', '% Aprobación', '% Negación']];

            var t = tipoMap[r.tipo];
            t.total++;
            if (r.tGestion !== null) { t.sumaG += r.tGestion; t.cG++; }
            if (r.tResolucion !== null && r.tResolucion > 0) { t.sumaR += r.tResolucion; t.cR++; if (r.tResolucion > 2) t.fueraSLA++; }
        });
        var tipoRows = [['Tipo', 'Total', 'T. Gestión Prom (min)', 'T. General Prom (horas)', 'Fuera SLA', '% del Total']];
        Object.keys(tipoMap).sort().forEach(function(tipo) {
            var t = tipoMap[tipo];

                tipo, t.total,
                t.cG > 0 ? Math.round(t.sumaG / t.cG * 10) / 10 : 0,
                t.cR > 0 ? Number((t.sumaR / t.cR).toFixed(2)) : 0,

        });

        // === HOJA 5: Producción Diaria ===

        });
        var wsProd = XLSX.utils.aoa_to_sheet(prodRows);
        _ajustarAnchosColumnas(wsProd, prodRows);
        XLSX.utils.book_append_sheet(wb, wsProd, 'Producción Diaria');

        // === HOJA 6: SLA Diario ===
        var slaRows = [['Fecha', 'Dentro SLA', 'Fuera SLA', 'Total', '% Cumplimiento']];
        (datos.slaDiario || []).forEach(function(d) {
            var total = d.dentroSLA + d.fueraSLA;
            slaRows.push([d.fecha, d.dentroSLA, d.fueraSLA, total, total > 0 ? Math.round(d.dentroSLA / total * 1000) / 10 : 100]);
        });
        var wsSLA = XLSX.utils.aoa_to_sheet(slaRows);
        _ajustarAnchosColumnas(wsSLA, slaRows);
        XLSX.utils.book_append_sheet(wb, wsSLA, 'SLA Diario');

        // === HOJA 7: Backlog ===
        var backlog = window._backlogDetalle || [];
        var bkRows = [['Solicitud', 'Analista', 'Origen', 'Tipo', 'Inmobiliaria', 'Segmento', 'Fecha Asignación', 'Minutos en Espera', 'Semáforo']];
        backlog.forEach(function(b) {
            var semaforo = b.alertaSLA === 'rojo' ? 'ROJO (>90 min)' : b.alertaSLA === 'amarillo' ? 'AMARILLO (45-90 min)' : 'VERDE (<45 min)';
            bkRows.push([b.solicitud || '', b.analista || '', b.origen || '', b.tipo || '', b.inmobiliaria || '', b.segmento || '', b.fechaAsignacion || '', b.minutosEspera || 0, semaforo]);
        });
        var wsBacklog = XLSX.utils.aoa_to_sheet(bkRows);
        _ajustarAnchosColumnas(wsBacklog, bkRows);
        XLSX.utils.book_append_sheet(wb, wsBacklog, 'Backlog Actual');

        // === HOJA 8: KPIs Consolidados ===
        var kpiRows = [
            ['Indicador', 'Valor'],
            ['Total Radicadas', datos.totalRadicadas || 0],
            ['Total Gestionadas', datos.totalGestionadas],
            ['T. Gestión Promedio (min)', datos.tiempoPromedioMinutos],
            ['T. General Promedio (horas)', datos.tiempoPromedioGeneralHoras || 0],
            ['T. Cola Promedio (min)', datos.tiempoColaPromedio],
            ['Tasa Aprobación (%)', datos.tasaAprobacion],
            ['Fuera de SLA', datos.fueraDeSLA],
            ['Negación Directa (cant)', datos.negacionDirecta || 0],
            ['% Negación', datos.pctNegacion || 0],
            ['% Aplazamiento', datos.pctAplazamiento || 0],
            ['% Negación Directa', datos.pctNegacionDirecta || 0],
            ['Backlog Actual', datos.backlog],
            [''],
            ['Rango', document.getElementById('metricaDesde').value + ' a ' + document.getElementById('metricaHasta').value],
            ['Fecha de Descarga', new Date().toLocaleString('es-CO', { timeZone: 'America/Bogota' })]
        ];
        var wsKPI = XLSX.utils.aoa_to_sheet(kpiRows);
        _ajustarAnchosColumnas(wsKPI, kpiRows);
        XLSX.utils.book_append_sheet(wb, wsKPI, 'KPIs');

        // === HOJA 9: Segmentación Inmobiliarias ===
        var segRows = [['Segmento', 'Inmobiliaria', 'Solicitudes', 'T. Cola Prom (min)', 'T. Gestión Prom (min)', 'T. General Prom (horas)']];
        var segData = _segmentacionData || {};
        Object.keys(segData).sort().forEach(function(seg) {
            (segData[seg] || []).forEach(function(inmob) {
                segRows.push([seg, inmob.inmobiliaria, inmob.count, inmob.tiempoColaPromedio, inmob.tiempoGestionPromedio, inmob.tiempoGeneralPromedio]);
            });
        });
        if (segRows.length > 1) {
            var wsSeg = XLSX.utils.aoa_to_sheet(segRows);
            _ajustarAnchosColumnas(wsSeg, segRows);
            XLSX.utils.book_append_sheet(wb, wsSeg, 'Segmentación');
        }

        // Generar y descargar
        var desde = document.getElementById('metricaDesde').value || 'datos';
        var hasta = document.getElementById('metricaHasta').value || '';
        var nombreArchivo = 'Metricas_Analisis_' + desde + '_a_' + hasta + '.xlsx';
        XLSX.writeFile(wb, nombreArchivo);

    } catch (e) {
        Swal.fire({ icon: 'error', title: 'Error al generar Excel', text: e.message || 'Error desconocido' });
    }
}

function _ajustarAnchosColumnas(ws, data) {
    if (!data || data.length === 0) return;
    var colWidths = [];
    data.forEach(function(row) {
        for (var i = 0; i < row.length; i++) {
            var len = String(row[i] || '').length;
            if (!colWidths[i] || len > colWidths[i]) colWidths[i] = len;
        }
    });
    ws['!cols'] = colWidths.map(function(w) { return { wch: Math.min(Math.max(w + 2, 10), 40) }; });
}

function _fmtMinLegible(min) {
    if (!min || min === 0) return '0m';
    var h = Math.floor(min / 60);
    var m = Math.round(min % 60);
    if (m === 60) { h++; m = 0; }
    if (h > 0 && m > 0) return h + 'h ' + m + 'm';
    if (h > 0) return h + 'h';
    return m + 'm';
}

function _fmtHorasLegible(horas) {
    if (!horas || horas === 0) return '0m';
    var totalMin = Math.round(horas * 60);
    var h = Math.floor(totalMin / 60);
    var m = totalMin % 60;
    if (h > 0 && m > 0) return h + 'h ' + m + 'm';
    if (h > 0) return h + 'h';
    return m + 'm';
}

        } else {
            badgeBrod = '<span style="color:var(--text-light);font-size:0.7rem;">—</span>';
        }

            badgeRes = '<span style="background:#fef3c7;color:#d97706;padding:2px 8px;border-radius:6px;font-size:0.7rem;font-weight:700;"><i class="bi bi-hourglass-split me-1"></i>A cola</span>';
        } else if (ne) {
            badgeRes = '<span style="color:var(--text-muted);font-size:0.7rem;">' + esc(ne) + '</span>';
        } else {
            badgeRes = '<span style="color:var(--text-light);font-size:0.7rem;">—</span>';

var _COORD_FIJO = 'desarrollocrmlibertador@ellibertador.co';

function renderListaAcceso(tipo, lista) {
    var cont = document.getElementById(tipo === 'coord' ? 'listaAccesoCoord' : 'listaAccesoBio');
    var fullList = tipo === 'coord' ? [_COORD_FIJO].concat(lista.filter(function(e) { return e !== _COORD_FIJO; })) : lista;
    if (!fullList.length) { cont.innerHTML = '<p style="font-size:0.72rem;color:var(--text-light);margin:0;">Sin usuarios.</p>'; return; }
    cont.innerHTML = fullList.map(function(email, idx) {
        var esFijo = (tipo === 'coord' && email === _COORD_FIJO);
        if (esFijo) return '<div class="agent-email-chip" style="opacity:0.7;"><i class="bi bi-lock-fill" style="font-size:0.65rem;margin-right:4px;"></i><span>' + esc(email) + '</span></div>';
        var realIdx = lista.indexOf(email);
        return '<div class="agent-email-chip"><span>' + esc(email) + '</span><button class="agent-email-chip-remove" onclick="eliminarAccesoLista(\'' + tipo + '\',' + realIdx + ')"><i class="bi bi-x"></i></button></div>';
    }).join('');
}

function agregarAccesoLista(tipo) {
    var inputId = tipo === 'coord' ? 'accessCoordEmailInput' : 'accessBioEmailInput';
    var input = document.getElementById(inputId);
    var email = (input.value || '').trim().toLowerCase();
    if (!email || email.indexOf('@') === -1) { Swal.fire({ icon: 'warning', title: 'Correo inválido' }); return; }
    var lista = tipo === 'coord' ? _listaCoord : _listaBio;
    if (lista.indexOf(email) !== -1) { Swal.fire({ icon: 'info', title: 'Ya existe' }); return; }
    lista.push(email);
    input.value = '';
    renderListaAcceso(tipo, lista);
}

function eliminarAccesoLista(tipo, idx) {
    var lista = tipo === 'coord' ? _listaCoord : _listaBio;
    lista.splice(idx, 1);
    renderListaAcceso(tipo, lista);
}

function guardarListasAccesoUI() {
    google.script.run.withSuccessHandler(function(r) {
        if (r.success) Swal.fire({ icon: 'success', title: 'Acceso guardado', text: r.coordinadores.length + ' coordinador(es), ' + r.biometria.length + ' usuario(s) biometría', timer: 2500, showConfirmButton: false });
    }).guardarListasAcceso(_listaCoord, _listaBio);
}

function cargarDatosAgente() {
    document.getElementById('agenteSpinner').style.display = 'block';
    document.getElementById('agenteContenido').style.display = 'none';
    google.script.run
        .withSuccessHandler(onDatosAgenteCargados)
        .withFailureHandler(function(e) {
            document.getElementById('agenteSpinner').style.display = 'none';
            Swal.fire({ icon: 'error', title: 'Error del Agente', text: e.message });
        })
        .agente_obtenerDatosDashboard();
}

function onDatosAgenteCargados(datos) {
    _agenteDatos = datos;
    _alertasActuales = datos.alerts || [];
    document.getElementById('agenteSpinner').style.display = 'none';
    document.getElementById('agenteContenido').style.display = 'block';

    renderGaugeHealthScore(datos.healthScore);
    renderComponentesScore(datos.healthScore);
    renderKpisResumenAgente(datos.kpis);
    renderAlertasAgente(datos.alerts);
    renderSugerenciasAgente(datos.alerts);
    renderSeguimientoPersonas(datos.seguimientoPersonas);
    renderCalidadDatos(datos.dataQuality);
    renderConfigAgente(datos.config);
    renderHistorialAlertas(datos.alertHistory);
    renderEstadoTriggers(datos.triggers);
    actualizarBadgeSidebar(datos.alerts);
    cargarListasAcceso();
}

// === GAUGE ===
function renderGaugeHealthScore(hs) {
    if (gaugeHealthScore) gaugeHealthScore.destroy();
    var score = hs.score || 0;
    var grade = hs.grade || 'F';
    var colors = { A: '#22c55e', B: '#253150', C: '#f59e0b', D: '#f97316', F: '#BD0F14' };
    var color = colors[grade] || '#BD0F14';

    var ctx = document.getElementById('gaugeHealthScore').getContext('2d');
    gaugeHealthScore = new Chart(ctx, {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [score, 100 - score],
                backgroundColor: [color, '#e5e7eb'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            rotation: -90, circumference: 180, cutout: '78%',
            plugins: { datalabels: { display: false }, legend: { display: false }, tooltip: { enabled: false } }
        }
    });

    document.getElementById('gaugeScoreValue').textContent = score;
    document.getElementById('gaugeScoreValue').style.color = color;
    var badge = document.getElementById('gaugeGradeBadge');
    badge.textContent = grade;
    badge.className = 'agent-gauge-grade agent-grade-' + grade;
    var gradeTexts = {
        A: 'Excelente — la operación funciona de manera óptima',
        B: 'Bien — la operación está en buen estado con oportunidades menores',
        C: 'Regular — hay aspectos que necesitan atención',
        D: 'Deficiente — la operación tiene problemas que requieren acción',
        F: 'Crítico — se requiere intervención inmediata'
    };
    document.getElementById('gaugeGradeExplain').textContent = gradeTexts[grade] || '';
    document.getElementById('gaugeTimestamp').textContent = hs.timestamp ? 'Última evaluación: ' + hs.timestamp : '';
}

// === ALERTAS ===
function renderAlertasAgente(alerts) {
    var cont = document.getElementById('alertasAgenteContainer');
    if (!alerts || alerts.length === 0) {
        cont.innerHTML = '<div style="text-align:center;padding:30px;"><i class="bi bi-check-circle" style="font-size:2.5rem;color:#22c55e;"></i><p style="font-size:0.9rem;font-weight:700;color:#166534;margin-top:8px;">Operación saludable — sin alertas</p></div>';
        document.getElementById('alertasResumen').textContent = 'Sin alertas activas';
        return;
    }

    var criticas = alerts.filter(function(a) { return a.severity === 'critico'; });
    var advertencias = alerts.filter(function(a) { return a.severity === 'advertencia'; });
    var infos = alerts.filter(function(a) { return a.severity === 'info'; });
    document.getElementById('alertasResumen').textContent = criticas.length + ' críticas, ' + advertencias.length + ' advertencias, ' + infos.length + ' informativas';

    var sf = document.getElementById('filtroAlertaSeverity').value;
    var cf = document.getElementById('filtroAlertaCategory').value;
    var filtered = alerts.filter(function(a) {
        if (sf !== 'todas' && a.severity !== sf) return false;
        if (cf !== 'todas' && a.category !== cf) return false;
        return true;
    });

    var html = '';
    filtered.forEach(function(al, idx) {
        var cls = 'agent-alert-' + al.severity;
        var icon = al.severity === 'critico' ? 'bi-exclamation-triangle-fill' : al.severity === 'advertencia' ? 'bi-exclamation-circle-fill' : 'bi-info-circle-fill';
        var catLabels = { sla: 'SLA', backlog: 'Backlog', inactividad: 'Inactividad', productividad: 'Productividad', tiempos: 'Tiempos', negacion: 'Negación', calidad: 'Calidad' };
        html += '<div class="agent-alert-card ' + cls + '">';
        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
        html += '<div style="flex:1;"><div class="agent-alert-title"><i class="bi ' + icon + ' me-1"></i>' + esc(al.title) + '</div>';
        html += '<div class="agent-alert-desc">' + esc(al.description) + '</div>';
        if (al.suggestion) html += '<div class="agent-alert-suggestion"><i class="bi bi-lightbulb me-1"></i>' + esc(al.suggestion) + '</div>';
        if (al.affectedEntities && al.affectedEntities.length > 0) html += '<div style="font-size:0.7rem;color:var(--text-light);margin-top:4px;"><strong>Afecta:</strong> ' + esc(al.affectedEntities.join(', ')) + '</div>';
        html += '</div>';
        html += '<span class="badge-pill" style="background:var(--bg-page);font-size:0.6rem;">' + (catLabels[al.category] || al.category) + '</span>';
        html += '</div></div>';
    });

    if (filtered.length === 0) html = '<p style="text-align:center;color:var(--text-light);padding:20px;">No hay alertas con estos filtros.</p>';
    cont.innerHTML = html;
}

function filtrarAlertasAgente() { renderAlertasAgente(_alertasActuales); }

// === SUGERENCIAS ===
function renderSugerenciasAgente(alerts) {
    var cont = document.getElementById('sugerenciasAgente');
    if (!alerts || alerts.length === 0) {
        cont.innerHTML = '<div class="agent-suggestion-card"><p style="font-size:0.85rem;color:#166534;margin:0;"><i class="bi bi-check-circle me-1"></i>Sin sugerencias — la operación está dentro de los parámetros esperados.</p></div>';
        return;
    }
    var sugs = [];
    var seen = {};
    alerts.forEach(function(a) {
        if (a.suggestion && !seen[a.suggestion]) {
            seen[a.suggestion] = true;
            sugs.push({ text: a.suggestion, severity: a.severity });
        }
    });
    if (sugs.length === 0) { cont.innerHTML = ''; return; }

    var html = '<div class="agent-suggestion-card">';
    sugs.forEach(function(s, i) {
        var col = s.severity === 'critico' ? 'var(--rojo)' : s.severity === 'advertencia' ? '#f59e0b' : 'var(--azul)';
        html += '<div class="agent-suggestion-item">';
        html += '<div class="agent-suggestion-number" style="background:' + col + ';">' + (i + 1) + '</div>';
        html += '<div style="font-size:0.82rem;color:var(--text-main);">' + esc(s.text) + '</div>';
        html += '</div>';
    });
    html += '</div>';
    cont.innerHTML = html;
}

// === CALIDAD DATOS ===
function renderCalidadDatos(dq) {
    var cont = document.getElementById('calidadDatosContainer');
    if (!dq) { cont.innerHTML = '<p style="color:var(--text-light);">Sin datos</p>'; return; }
    var pctOutliers = dq.totalRegistros > 0 ? Math.round(dq.outliers.total / dq.totalRegistros * 1000) / 10 : 0;
    var items = [
        { label: 'Registros Hoy', value: dq.totalRegistros, color: 'var(--azul)', icon: 'bi-database', hint: 'Solicitudes gestionadas hoy' },
        { label: 'Outliers', value: dq.outliers.total, sub: pctOutliers + '%', color: dq.outliers.total > 0 ? '#f59e0b' : '#22c55e', icon: 'bi-graph-up-arrow', hint: 'Tiempos extremadamente altos vs el promedio' },
        { label: 'Analistas Activos', value: dq.analistasConGestiones + '/' + dq.analistasActivos, color: 'var(--azul)', icon: 'bi-people', hint: 'Con gestiones hoy / total activos' },
        { label: 'Backlog Actual', value: dq.backlogActual, color: dq.backlogActual > 15 ? 'var(--rojo)' : 'var(--azul)', icon: 'bi-inbox', hint: 'Solicitudes asignadas sin cerrar' }
    ];
    var html = '';
    items.forEach(function(it) {
        html += '<div class="agent-quality-metric" style="cursor:pointer;" onclick="detalleCalidad(\'' + it.label + '\')">';
        html += '<i class="bi ' + it.icon + '" style="font-size:1.2rem;color:' + it.color + ';"></i>';
        html += '<div class="agent-quality-value" style="color:' + it.color + ';">' + it.value + '</div>';
        html += '<div class="agent-quality-label">' + it.label + '</div>';
        if (it.sub) html += '<div style="font-size:0.6rem;color:var(--text-light);">' + it.sub + '</div>';
        html += '<div style="font-size:0.6rem;color:var(--text-light);margin-top:2px;line-height:1.2;">' + it.hint + '</div>';
        html += '</div>';
    });
    cont.innerHTML = html;
}

function detalleCalidad(label) {
    if (!_agenteDatos || !_agenteDatos.dataQuality) return;
    var dq = _agenteDatos.dataQuality;
    var html = '';
    if (label === 'Campos Vacíos') {
        html = '<table class="table table-sm" style="font-size:0.82rem;"><tbody>';
        html += '<tr><td>Sin ID de solicitud</td><td class="fw-bold">' + dq.camposVacios.sinId + '</td></tr>';
        html += '<tr><td>Sin estado</td><td class="fw-bold">' + dq.camposVacios.sinEstado + '</td></tr>';
        html += '<tr><td>Sin analista</td><td class="fw-bold">' + dq.camposVacios.sinAnalista + '</td></tr>';
        html += '<tr><td>Sin fecha</td><td class="fw-bold">' + dq.camposVacios.sinFecha + '</td></tr>';
        html += '</tbody></table>';
    } else if (label === 'Outliers') {
        html = '<table class="table table-sm" style="font-size:0.82rem;"><tbody>';
        html += '<tr><td>Outliers T. Gestión</td><td class="fw-bold">' + dq.outliers.gestion + '</td><td style="font-size:0.7rem;color:var(--text-light);">Umbral: >' + dq.outliers.umbralGestion + ' min</td></tr>';
        html += '<tr><td>Outliers T. General</td><td class="fw-bold">' + dq.outliers.general + '</td><td style="font-size:0.7rem;color:var(--text-light);">Umbral: >' + dq.outliers.umbralGeneral + ' min</td></tr>';
        html += '</tbody></table>';
    } else {

// === CONFIGURACIÓN ===
var _listaEmails = [];

function renderConfigAgente(config) {
    if (!config) return;
    document.getElementById('cfgSlaPct').value = config.metas.slaPct || 90;
    document.getElementById('cfgMaxGestion').value = config.metas.maxTiempoGestionMin || 20;
    document.getElementById('cfgMaxGeneral').value = config.metas.maxTiempoGeneralHoras || 2;
    document.getElementById('cfgMaxCola').value = config.metas.maxTiempoColaMin || 45;
    document.getElementById('cfgMaxBacklog').value = config.metas.maxBacklog || 15;
    document.getElementById('cfgDesviacion').value = config.umbrales.desviacionHistoricaPct || 20;
    document.getElementById('cfgEnviarCriticas').checked = config.notificaciones.enviarAlertasCriticas !== false;
    document.getElementById('cfgEnviarResumen').checked = config.notificaciones.enviarResumenDiario !== false;

    // Cargar lista de emails
    var emailRaw = config.coordinatorEmail || '';
    _listaEmails = emailRaw.split(',').map(function(e) { return e.trim(); }).filter(function(e) { return e.length > 0; });
    renderListaDestinatarios();
}

function renderListaDestinatarios() {
    var cont = document.getElementById('listaDestinatarios');
    if (_listaEmails.length === 0) {
        cont.innerHTML = '<div style="font-size:0.75rem;color:var(--text-light);padding:6px 0;">Sin destinatarios agregados</div>';
        return;
    }
    var html = '';
    _listaEmails.forEach(function(email, idx) {
        html += '<div class="agent-email-chip">';
        html += '<i class="bi bi-envelope-fill" style="font-size:0.65rem;"></i> ';
        html += '<span>' + esc(email) + '</span>';
        html += '<button onclick="eliminarDestinatario(' + idx + ')" class="agent-email-chip-remove" title="Eliminar"><i class="bi bi-x"></i></button>';
        html += '</div>';
    });
    cont.innerHTML = html;
}

function agregarDestinatario() {
    var input = document.getElementById('cfgEmailInput');
    var email = (input.value || '').trim().toLowerCase();
    if (!email || !email.includes('@')) {
        Swal.fire({ icon: 'warning', title: 'Correo inválido', text: 'Ingresa un correo electrónico válido.', timer: 2000, showConfirmButton: false });
        return;
    }
    if (_listaEmails.indexOf(email) >= 0) {
        Swal.fire({ icon: 'info', title: 'Ya agregado', text: 'Este correo ya está en la lista.', timer: 1500, showConfirmButton: false });
        return;
    }
    _listaEmails.push(email);
    input.value = '';
    renderListaDestinatarios();
}

function eliminarDestinatario(idx) {
    _listaEmails.splice(idx, 1);
    renderListaDestinatarios();
}

function guardarConfigAgente() {
    var config = {
        coordinatorEmail: _listaEmails.join(','),
        metas: {
            slaPct: parseInt(document.getElementById('cfgSlaPct').value) || 90,
            maxTiempoGestionMin: parseInt(document.getElementById('cfgMaxGestion').value) || 20,
            maxTiempoGeneralHoras: parseFloat(document.getElementById('cfgMaxGeneral').value) || 2,
            maxTiempoColaMin: parseInt(document.getElementById('cfgMaxCola').value) || 45,
            maxBacklog: parseInt(document.getElementById('cfgMaxBacklog').value) || 15
        },
        umbrales: {
            desviacionHistoricaPct: parseInt(document.getElementById('cfgDesviacion').value) || 20
        },
        notificaciones: {
            enviarAlertasCriticas: document.getElementById('cfgEnviarCriticas').checked,
            enviarResumenDiario: document.getElementById('cfgEnviarResumen').checked
        }
    };
    google.script.run
        .withSuccessHandler(function(res) {
            Swal.fire({ icon: 'success', title: 'Configuración guardada', text: 'Las metas y umbrales se actualizaron correctamente.', timer: 2000, showConfirmButton: false });
        })
        .withFailureHandler(function(e) {
            Swal.fire({ icon: 'error', title: 'Error', text: e.message });
        })
        .agente_guardarConfig(config);
}

// === HISTORIAL ===
function renderHistorialAlertas(history) {
    if ($.fn.DataTable.isDataTable('#tablaHistorialAlertas')) $('#tablaHistorialAlertas').DataTable().destroy();
    var tb = document.getElementById('cuerpoHistorialAlertas');
    if (!history || history.length === 0) {
        tb.innerHTML = '<tr><td colspan="4" class="text-center py-3" style="color:var(--gris);">Sin historial</td></tr>';
        return;
    }
    var sevBadge = { critico: 'background:#fde8e8;color:#BD0F14;', advertencia: 'background:#fef9c3;color:#a16207;', info: 'background:#e8edf6;color:#253150;' };
    var catLabels = { sla: 'SLA', backlog: 'Backlog', inactividad: 'Inactividad', productividad: 'Productividad', tiempos: 'Tiempos', negacion: 'Negación', calidad: 'Calidad' };
    var html = '';
    history.forEach(function(al) {
        var style = sevBadge[al.severity] || sevBadge.info;
        html += '<tr><td style="font-size:0.72rem;">' + esc(al.timestamp || '—') + '</td>';
        html += '<td><span class="badge-pill" style="' + style + '">' + esc(al.severity) + '</span></td>';
        html += '<td><span class="badge-pill badge-esp-digital">' + esc(catLabels[al.category] || al.category) + '</span></td>';
        html += '<td>' + esc(al.title) + '</td></tr>';
    });
    tb.innerHTML = html;
    $('#tablaHistorialAlertas').DataTable({ language: { url: '//cdn.datatables.net/plug-ins/1.13.5/i18n/es-ES.json' }, pageLength: 10, order: [[0, 'desc']] });
}

// === TRIGGERS ===
function renderEstadoTriggers(triggers) {
    var cont = document.getElementById('triggerStatusBadge');
    if (triggers.installed) {
        cont.innerHTML = '<span class="agent-trigger-badge agent-trigger-active"><i class="bi bi-check-circle-fill"></i> Activos (' + triggers.count + ')</span>';
    } else {
        cont.innerHTML = '<span class="agent-trigger-badge agent-trigger-inactive"><i class="bi bi-dash-circle"></i> No instalados</span>';
    }
    var detalle = document.getElementById('triggerDetalle');
    if (!detalle) return;
    if (!triggers.installed || !triggers.triggers || triggers.triggers.length === 0) {
        detalle.innerHTML = '<div style="font-size:0.78rem;color:var(--text-light);padding:8px 0;">No hay triggers activos. Instálalos para recibir alertas y resúmenes automáticos.</div>';
        return;
    }
    var descMap = {
        'agente_triggerHorario': { nombre: 'Revisión Horaria', desc: 'Cada hora (8:00-17:00, lunes a viernes) revisa la operación y envía correo si detecta alertas críticas', icon: 'bi-clock-history', color: 'var(--azul)' },
        'agente_triggerResumenDiario': { nombre: 'Resumen Diario', desc: 'A las 17:00 (lunes a viernes) envía un correo con el resumen operativo completo del día', icon: 'bi-envelope-paper', color: 'var(--rojo)' }
    };
    var html = '';
    triggers.triggers.forEach(function(t) {
        var info = descMap[t.functionName] || { nombre: t.functionName, desc: '', icon: 'bi-gear', color: 'var(--gris)' };
        html += '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">';
        html += '<div style="min-width:32px;height:32px;border-radius:8px;background:' + info.color + ';color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.85rem;"><i class="bi ' + info.icon + '"></i></div>';
        html += '<div><div style="font-size:0.82rem;font-weight:700;color:var(--text-main);">' + info.nombre + '</div>';
        html += '<div style="font-size:0.72rem;color:var(--text-muted);line-height:1.3;">' + info.desc + '</div></div>';
        html += '</div>';
    });
    detalle.innerHTML = html;
}

function instalarTriggersAgente() {
    Swal.fire({ title: 'Instalar Triggers', text: 'Se creará una revisión automática cada hora (8-17h) y un resumen diario a las 17:00. ¿Continuar?', icon: 'question', showCancelButton: true, confirmButtonColor: '#253150', confirmButtonText: 'Instalar', cancelButtonText: 'Cancelar' }).then(function(result) {
        if (!result.isConfirmed) return;
        google.script.run
            .withSuccessHandler(function(res) {
                Swal.fire({ icon: 'success', title: 'Triggers instalados', text: res.message, timer: 2500, showConfirmButton: false });
                renderEstadoTriggers({ installed: true, count: 2 });
            })
            .withFailureHandler(function(e) { Swal.fire({ icon: 'error', title: 'Error', text: e.message }); })
            .agente_instalarTriggers();
    });
}

function desinstalarTriggersAgente() {
    Swal.fire({ title: 'Desinstalar Triggers', text: '¿Desactivar las revisiones automáticas?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#BD0F14', confirmButtonText: 'Desinstalar', cancelButtonText: 'Cancelar' }).then(function(result) {
        if (!result.isConfirmed) return;
        google.script.run
            .withSuccessHandler(function() {
                Swal.fire({ icon: 'success', title: 'Triggers eliminados', timer: 1500, showConfirmButton: false });
                renderEstadoTriggers({ installed: false, count: 0 });
            })
            .withFailureHandler(function(e) { Swal.fire({ icon: 'error', title: 'Error', text: e.message }); })
            .agente_desinstalarTriggers();
    });
}

// === ACCIONES RÁPIDAS ===
function recalcularAgente() {
    Swal.fire({ title: 'Recalculando...', didOpen: function() { Swal.showLoading(); }, allowOutsideClick: false });
    google.script.run
        .withSuccessHandler(function(diagnostico) {
            Swal.close();
            _agenteDatos = Object.assign(_agenteDatos || {}, diagnostico);
            _alertasActuales = diagnostico.alerts || [];
            renderGaugeHealthScore(diagnostico.healthScore);
            renderComponentesScore(diagnostico.healthScore);
            renderKpisResumenAgente(diagnostico.kpis);
            renderAlertasAgente(diagnostico.alerts);
            renderSugerenciasAgente(diagnostico.alerts);
            renderSeguimientoPersonas(diagnostico.seguimientoPersonas);
            renderCalidadDatos(diagnostico.dataQuality);
            actualizarBadgeSidebar(diagnostico.alerts);
            Swal.fire({ icon: 'success', title: 'Diagnóstico actualizado', timer: 1500, showConfirmButton: false });
        })
        .withFailureHandler(function(e) { Swal.fire({ icon: 'error', title: 'Error', text: e.message }); })
        .agente_ejecutarManual();
}

function enviarResumenManualAgente() {
    Swal.fire({ title: 'Enviar Resumen', text: 'Se enviará el resumen operativo por correo. ¿Continuar?', icon: 'question', showCancelButton: true, confirmButtonColor: '#253150', confirmButtonText: 'Enviar', cancelButtonText: 'Cancelar' }).then(function(result) {
        if (!result.isConfirmed) return;
        Swal.fire({ title: 'Enviando...', didOpen: function() { Swal.showLoading(); }, allowOutsideClick: false });
        google.script.run
            .withSuccessHandler(function(res) {
                Swal.close();
                if (res.sent) {
                    Swal.fire({ icon: 'success', title: 'Correo enviado', text: 'Resumen enviado a ' + res.to, timer: 2500, showConfirmButton: false });
                } else {
                    Swal.fire({ icon: 'warning', title: 'No se envió', text: res.reason });
                }
            })
            .withFailureHandler(function(e) { Swal.fire({ icon: 'error', title: 'Error', text: e.message }); })
            .agente_enviarResumenManual();
    });
}

// === BADGE SIDEBAR ===
function actualizarBadgeSidebar(alerts) {
    var badge = document.getElementById('badgeAlertasSidebar');
    var criticas = (alerts || []).filter(function(a) { return a.severity === 'critico'; });
    if (criticas.length > 0) {
        badge.textContent = criticas.length;
        badge.style.display = 'inline-flex';
    } else {
        badge.style.display = 'none';
    }
}
