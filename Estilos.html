<style>
:root {
    --rojo:        #BD0F14;
    --rojo-dark:   #8b0a0e;
    --rojo-light:  #fde8e8;
    --rojo-mid:    #f87171;
    --azul:        #253150;
    --azul-dark:   #161e33;
    --azul-mid:    #3a4d7a;
    --azul-light:  #e8edf6;
    --gris:        #706F6F;
    --gris-light:  #f1f0f0;
    --gris-dark:   #4a4a4a;
    --grad-rojo:   linear-gradient(135deg, #8b0a0e 0%, #BD0F14 55%, #e05555 100%);
    --grad-azul:   linear-gradient(135deg, #161e33 0%, #253150 60%, #3a4d7a 100%);
    --bg-page:     #F4F5F8;
    --bg-card:     #FFFFFF;
    --text-main:   #253150;
    --text-muted:  #706F6F;
    --text-light:  #94a3b8;
    --border:      #e5e7eb;
    --sidebar-w:   240px;
    --sidebar-collapsed: 62px;
    --radius:      20px;
    --shadow:      0 2px 12px rgba(37,49,80,0.08);
}
body { font-family:'Manrope',sans-serif; background:var(--bg-page); color:var(--text-main); }

/* Splash de carga inicial (Acceso → Datos → Panel) */
@keyframes splashPulse {
    0% { box-shadow:0 0 0 0 rgba(230,74,95,0.45); }
    70% { box-shadow:0 0 0 14px rgba(230,74,95,0); }
    100% { box-shadow:0 0 0 0 rgba(230,74,95,0); }
}
@keyframes splashSpin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
@keyframes splashDotBlink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

.splash-overlay {
    position:fixed; inset:0; z-index:9999;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 15% 15%, #3a0d14 0%, #1a0a10 28%, #0a0e1a 65%);
    transition:opacity 0.5s ease, visibility 0.5s ease;
    font-family:'Manrope',sans-serif;
}
.splash-overlay.splash-hidden { opacity:0; visibility:hidden; pointer-events:none; }

.splash-card {
    width:100%; max-width:480px; margin:0 24px;
    background:rgba(0,0,0,0.45); border-radius:24px; padding:40px 36px;
    text-align:center; backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.06);
}

.splash-avatar-wrap { position:relative; width:96px; height:96px; margin:0 auto 24px; }
.splash-avatar-ring { position:absolute; inset:0; border-radius:50%; border:1.5px solid rgba(230,74,95,0.35); animation:splashPulse 2.2s infinite; }
.splash-avatar {
    position:absolute; inset:10px; border-radius:50%;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.splash-avatar img { width:60%; height:60%; object-fit:contain; }
.splash-dot {
    position:absolute; top:-2px; left:50%; transform:translateX(-50%);
    width:10px; height:10px; border-radius:50%; background:#e64a5f;
    box-shadow:0 0 0 3px rgba(0,0,0,0.4);
    animation:splashDotBlink 1.6s infinite;
}

.splash-saludo { font-size:1.4rem; font-weight:800; color:#fff; margin-bottom:6px; }
.splash-saludo .splash-nombre { color:#e64a5f; }
.splash-subtitulo { font-size:0.85rem; color:#b8bcc8; margin-bottom:10px; }
.splash-frase { font-size:0.78rem; color:#6b7280; font-style:italic; margin-bottom:28px; }

.splash-pasos { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:18px; }
.splash-paso { display:flex; flex-direction:column; align-items:center; gap:6px; opacity:0.4; transition:opacity 0.3s; }
.splash-paso.activo, .splash-paso.completado, .splash-paso.error { opacity:1; }
.splash-paso-icon {
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.12);
    color:#6b7280; font-size:1.1rem; transition:all 0.3s;
}
.splash-paso.completado .splash-paso-icon { background:var(--rojo); border-color:var(--rojo); color:#fff; }
.splash-paso.activo .splash-paso-icon { background:rgba(59,130,246,0.15); border-color:#3b82f6; color:#3b82f6; }
.splash-paso.activo .splash-paso-icon i { display:inline-block; animation:splashSpin 1s linear infinite; }
.splash-paso.error .splash-paso-icon { background:rgba(189,15,20,0.15); border-color:var(--rojo); color:var(--rojo); }
.splash-paso-label { font-size:0.62rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:#9ca3af; }
.splash-chevron { color:#4b5563; font-size:0.9rem; }

.splash-progress-bar { height:4px; border-radius:4px; background:rgba(255,255,255,0.08); overflow:hidden; }
.splash-progress-fill { height:100%; width:0%; background:linear-gradient(90deg, var(--rojo), #3b82f6); transition:width 0.5s ease; }

.splash-error-msg { font-size:0.78rem; color:#f87171; margin-top:14px; display:none; }

#sidebar {
    width:var(--sidebar-collapsed); height:100vh; background:var(--bg-card);
    position:fixed; top:0; left:0;
    display:flex; flex-direction:column;
    border-right:1px solid var(--border); z-index:100;
    transition:width 0.25s ease;
    overflow:hidden;
}
#sidebar:hover { width:var(--sidebar-w); box-shadow:4px 0 20px rgba(37,49,80,0.12); }
#sidebar .sidebar-brand {
    display:flex; align-items:center; gap:12px;
    padding:22px 12px; border-bottom:1px solid var(--border);
    white-space:nowrap; overflow:hidden;
}
.brand-icon {
    width:38px; height:38px; background:var(--grad-rojo);
    border-radius:11px; display:flex; align-items:center; justify-content:center;
    color:white; font-size:1rem; flex-shrink:0;
    box-shadow:0 4px 14px rgba(189,15,20,0.35);
}
.brand-name { font-size:1.1rem; font-weight:800; color:var(--text-main); letter-spacing:-0.3px; opacity:0; transition:opacity 0.2s ease; white-space:nowrap; }
#sidebar:hover .brand-name { opacity:1; }
.sidebar-section { padding:18px 6px 4px; }
.sidebar-label {
    font-size:0.62rem; font-weight:700; text-transform:uppercase;
    letter-spacing:1.2px; color:var(--text-light); padding:0 8px; margin-bottom:6px;
    opacity:0; transition:opacity 0.2s ease; white-space:nowrap;
}
#sidebar:hover .sidebar-label { opacity:1; }
.nav-link-admin {
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; border-radius:11px;
    color:var(--text-muted); text-decoration:none;
    font-weight:500; font-size:0.875rem;
    transition:all 0.2s; position:relative; margin-bottom:2px;
    white-space:nowrap; overflow:hidden;
}
.nav-link-admin .nav-text { opacity:0; transition:opacity 0.2s ease; }
#sidebar:hover .nav-link-admin .nav-text { opacity:1; }
.nav-link-admin i { font-size:1.1rem; flex-shrink:0; min-width:20px; text-align:center; }
.nav-link-admin:hover { background:var(--azul-light); color:var(--azul); }
.nav-link-admin.active { background:var(--rojo-light); color:var(--rojo); font-weight:700; }
.sidebar-footer { opacity:0; transition:opacity 0.2s ease; white-space:nowrap; overflow:hidden; }
#sidebar:hover .sidebar-footer { opacity:1; }

.main-content { margin-left:var(--sidebar-collapsed); padding:22px 28px 48px; min-height:100vh; transition:margin-left 0.25s ease; }
.page-title { font-size:2rem; font-weight:800; letter-spacing:-0.5px; color:var(--azul); }
.page-sub   { font-size:0.83rem; color:var(--gris); margin-top:3px; }

.btn-primary-brand {
    display:flex; align-items:center; gap:6px;
    background:var(--grad-rojo); color:white; border:none;
    border-radius:50px; padding:10px 22px;
    font-size:0.84rem; font-weight:700; font-family:'Manrope',sans-serif;
    cursor:pointer; transition:all 0.2s;
    box-shadow:0 4px 14px rgba(189,15,20,0.35); text-decoration:none;
}
.btn-primary-brand:hover { filter:brightness(1.1); transform:translateY(-1px); }
.btn-outline-brand {
    display:flex; align-items:center; gap:6px;
    background:white; color:var(--text-main);
    border:1.5px solid var(--border); border-radius:50px; padding:10px 20px;
    font-size:0.84rem; font-weight:600; font-family:'Manrope',sans-serif;
    cursor:pointer; transition:all 0.2s;
}
.btn-outline-brand:hover { border-color:var(--azul-mid); color:var(--azul); }

.metrics-row { display:grid; grid-template-columns:repeat(5,1fr); gap:16px; margin-bottom:24px; }
@media (max-width: 1200px) { .metrics-row { grid-template-columns:repeat(2,1fr); } }
@media (max-width: 768px) { .metrics-row { grid-template-columns:1fr; } }

.metric-card {
    background:var(--bg-card); border-radius:var(--radius); padding:22px;
    box-shadow:var(--shadow); transition:transform 0.25s,box-shadow 0.25s;
    border:1px solid var(--border);
}
.metric-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(37,49,80,0.12); }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.metric-label { font-size:0.8rem; font-weight:600; color:var(--text-muted); }
.card-arrow {
    width:30px; height:30px; border-radius:50%;
    border:1.5px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    color:var(--text-muted); font-size:0.75rem; flex-shrink:0;
}
.metric-value { font-size:2.2rem; font-weight:800; line-height:1; letter-spacing:-1px; margin-bottom:10px; color:var(--text-main); }
.metric-trend { display:flex; align-items:center; gap:6px; font-size:0.73rem; font-weight:600; color:var(--text-muted); }
.trend-chip { background:rgba(37,49,80,0.08); color:var(--azul); border-radius:6px; padding:2px 8px; font-size:0.7rem; font-weight:700; }

/* Macro (hero) → micro (detalle) — tarjeta total en grande + desglose con barra proporcional */
.metric-hero-card {
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    border-radius:var(--radius); padding:22px 26px; margin-bottom:12px; color:#fff;
    box-shadow:var(--shadow); cursor:pointer; transition:transform 0.2s;
}
.metric-hero-card:hover { transform:translateY(-2px); }
.metric-hero-card.metric-hero-azul { background:var(--grad-azul); }
.metric-hero-card.metric-hero-rojo { background:var(--grad-rojo); }
.metric-hero-label { font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; opacity:0.9; }
.metric-hero-sub { font-size:0.75rem; opacity:0.7; margin-top:4px; }
.metric-hero-value { font-size:2.6rem; font-weight:800; line-height:1; }

.metric-split-bar { display:flex; height:10px; border-radius:6px; overflow:hidden; margin-bottom:16px; background:var(--bg-page); }
.metric-split-seg { transition:width 0.5s ease; }

.metrics-row-detail { display:grid; gap:14px; margin-bottom:26px; }
@media (max-width: 700px) { .metrics-row-detail { grid-template-columns:1fr !important; } }
.metric-detail-card {
    display:flex; align-items:center; gap:12px; background:var(--bg-card); border:1px solid var(--border);
    border-radius:14px; padding:14px 18px; cursor:pointer; box-shadow:var(--shadow); transition:transform 0.2s;
}
.metric-detail-card:hover { transform:translateY(-2px); }
.metric-detail-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.metric-detail-text { display:flex; flex-direction:column; flex:1; min-width:0; }
.metric-detail-label { font-size:0.7rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.3px; }
.metric-detail-value { font-size:1.5rem; font-weight:800; color:var(--text-main); line-height:1.3; }
.metric-detail-pct { font-size:1.15rem; font-weight:800; flex-shrink:0; }

.table-container {
    background:var(--bg-card); border-radius:var(--radius); padding:26px;
    box-shadow:var(--shadow); border:1px solid var(--border); margin-top:24px;
}
.table-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.table-title  { font-size:1rem; font-weight:800; color:var(--text-main); }
.table-sub    { font-size:0.75rem; color:var(--text-muted); margin-top:2px; }
.table { color:var(--text-main) !important; background:transparent !important; }
.table thead th {
    background:var(--bg-page) !important; color:var(--text-muted) !important;
    font-size:0.67rem; font-weight:700; text-transform:uppercase; letter-spacing:1px;
    border:none !important; padding:10px 14px;
}
.table tbody td { padding:13px 14px; border-bottom:1px solid var(--border) !important; vertical-align:middle; font-size:0.875rem; }

.badge-pill {
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 11px; border-radius:20px;
    font-size:0.72rem; font-weight:700; white-space:nowrap;
}
.badge-esp-digital  { background:var(--azul-light); color:var(--azul); border:1px solid #c7d2e8; }
.badge-esp-desplaz  { background:var(--rojo-light); color:var(--rojo); border:1px solid #f8c4c4; }
.badge-esp-traslado { background:var(--gris-light); color:var(--gris-dark); border:1px solid #d4d4d4; }
.badge-est-activo      { background:var(--azul-light); color:var(--azul); border:1px solid #c7d2e8; }
.badge-est-almuerzo    { background:#fef9c3; color:#a16207; border:1px solid #fde68a; }
.badge-est-breakm      { background:var(--gris-light); color:var(--gris-dark); border:1px solid #d4d4d4; }
.badge-est-breakt      { background:var(--gris-light); color:var(--gris-dark); border:1px solid #d4d4d4; }
.badge-est-breakb      { background:var(--gris-light); color:var(--gris-dark); border:1px solid #d4d4d4; }
.badge-est-imprevisto  { background:var(--rojo-light); color:var(--rojo-dark); border:1px solid #f8c4c4; }
.badge-est-inactivo    { background:var(--gris-light); color:var(--gris); border:1px solid #d4d4d4; }
.badge-est-default     { background:var(--gris-light); color:var(--gris); border:1px solid #d4d4d4; }
.badge-hora { background:var(--bg-page); color:var(--text-muted); border:1px solid var(--border); padding:4px 9px; border-radius:7px; font-size:0.7rem; font-weight:600; display:inline-flex; align-items:center; gap:4px; }

.btn-action {
    width:32px; height:32px; border-radius:9px;
    border:1.5px solid var(--border); background:var(--bg-card); color:var(--text-muted);
    display:inline-flex; align-items:center; justify-content:center;
    font-size:0.82rem; cursor:pointer; transition:all 0.2s;
}
.btn-action:hover { background:var(--rojo); color:white; border-color:var(--rojo); }

.main-content { position:relative; z-index:1; }

.tipo-card {
    display:flex; align-items:center; gap:8px;
    background:var(--bg-card); border-radius:10px; padding:8px 10px;
    border:1px solid var(--border); box-shadow:0 1px 4px rgba(37,49,80,0.04);
    transition:transform 0.2s; overflow:hidden;
}
.tipo-card:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
.tipo-icon {
    width:28px; height:28px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:0.72rem; flex-shrink:0;
}
.tipo-info { display:flex; flex-direction:column; min-width:0; flex:1; }
.tipo-label { font-size:0.58rem; font-weight:700; color:var(--gris); text-transform:uppercase; letter-spacing:0.4px; }
.tipo-value { font-size:1.1rem; font-weight:800; color:var(--azul); line-height:1.1; }
.tipo-prom {
    font-size:0.6rem; font-weight:700;
    color:var(--gris); background:var(--gris-light);
    padding:2px 5px; border-radius:5px; white-space:nowrap; flex-shrink:0;
}
.tab-panel { animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.rendimiento-toggle {
    padding:6px 14px; border:none; background:transparent;
    color:var(--text-muted); cursor:pointer; transition:all 0.2s;
    font-family:'Manrope',sans-serif; font-weight:700; font-size:0.72rem;
}
.rendimiento-toggle.active { background:var(--rojo); color:white; }
.rendimiento-toggle:hover:not(.active) { background:var(--gris-light); }
.btn-nav-fecha {
    width:30px; height:30px; border-radius:8px;
    border:1.5px solid var(--border); background:var(--bg-card);
    color:var(--text-muted); display:inline-flex; align-items:center; justify-content:center;
    font-size:0.78rem; cursor:pointer; transition:all 0.2s;
}
.btn-nav-fecha:hover { background:var(--azul-light); color:var(--azul); border-color:var(--azul-mid); }

/* Semáforo Backlog */
.semaforo-verde { background:#d1fae5 !important; }
.semaforo-amarillo { background:#fef9c3 !important; }
.semaforo-rojo { background:#fde8e8 !important; }

/* Botón ayuda gráfico */
.btn-help-chart {
    display:inline-flex; align-items:center; justify-content:center;
    width:20px; height:20px; border-radius:50%;
    background:var(--azul-light); color:var(--azul-mid);
    border:1px solid var(--border); font-size:0.65rem; font-weight:800;
    cursor:pointer; margin-left:8px; transition:all 0.2s;
    vertical-align:middle; line-height:1;
}
.btn-help-chart:hover { background:var(--azul); color:#fff; border-color:var(--azul); }

/* === AGENTE COORDINADOR === */
.agent-gauge-score { font-size:2.8rem; font-weight:800; line-height:1; }
.agent-gauge-grade { font-size:1rem; font-weight:700; border-radius:8px; padding:3px 14px; display:inline-block; }
.agent-grade-A { background:#d1fae5; color:#166534; }
.agent-grade-B { background:var(--azul-light); color:var(--azul); }
.agent-grade-C { background:#fef9c3; color:#a16207; }
.agent-grade-D { background:#fed7aa; color:#c2410c; }
.agent-grade-F { background:var(--rojo-light); color:var(--rojo); }

.agent-alert-card { border-left:4px solid; border-radius:12px; padding:14px 16px; margin-bottom:10px; transition:transform 0.15s; }
.agent-alert-card:hover { transform:translateX(3px); }
.agent-alert-critico { border-left-color:var(--rojo); background:var(--rojo-light); }
.agent-alert-advertencia { border-left-color:#f59e0b; background:#fffbeb; }
.agent-alert-info { border-left-color:var(--azul); background:var(--azul-light); }
.agent-alert-title { font-weight:700; font-size:0.88rem; color:var(--text-main); }
.agent-alert-desc { font-size:0.78rem; color:var(--text-muted); margin-top:4px; line-height:1.4; }
.agent-alert-suggestion { font-size:0.76rem; color:var(--azul-mid); margin-top:6px; padding:6px 10px; background:rgba(37,49,80,0.04); border-radius:6px; line-height:1.4; }

.agent-suggestion-card { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:12px; padding:16px; }
.agent-suggestion-item { display:flex; gap:10px; align-items:flex-start; margin-bottom:10px; }
.agent-suggestion-item:last-child { margin-bottom:0; }
.agent-suggestion-number { min-width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:0.7rem; font-weight:800; flex-shrink:0; }

.agent-config-form .form-label { font-size:0.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
.agent-config-form .form-control { border-radius:10px; font-size:0.82rem; border:1.5px solid var(--border); }
.agent-config-form .form-control:focus { border-color:var(--azul-mid); box-shadow:0 0 0 3px rgba(37,49,80,0.08); }

.agent-quality-metric { text-align:center; padding:16px 10px; border-radius:12px; background:var(--bg-page); border:1px solid var(--border); transition:transform 0.2s; }
.agent-quality-metric:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
.agent-quality-value { font-size:1.8rem; font-weight:800; line-height:1.2; margin:4px 0; }
.agent-quality-label { font-size:0.65rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }

.agent-trigger-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius:20px; font-size:0.75rem; font-weight:700; }
.agent-trigger-active { background:#d1fae5; color:#166534; border:1px solid #bbf7d0; }
.agent-trigger-inactive { background:var(--gris-light); color:var(--gris); border:1px solid #d4d4d4; }

.agent-component-bar { height:6px; border-radius:3px; background:var(--gris-light); overflow:hidden; }
.agent-component-fill { height:100%; border-radius:3px; transition:width 0.6s ease; }

.agent-quick-actions { display:flex; gap:10px; flex-wrap:wrap; }
.agent-quick-btn { padding:10px 16px; border-radius:10px; font-size:0.78rem; font-weight:700; border:1.5px solid var(--border); background:white; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:6px; font-family:'Manrope',sans-serif; }
.agent-quick-btn:hover { border-color:var(--azul-mid); background:var(--azul-light); color:var(--azul); }
.agent-quick-btn-primary { background:var(--grad-rojo); color:white; border:none; box-shadow:0 4px 14px rgba(189,15,20,0.35); }
.agent-quick-btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }

.agent-sidebar-badge {
    min-width:18px; height:18px; border-radius:50%;
    background:var(--rojo); color:white;
